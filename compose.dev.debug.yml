# compose.dev.debug.yml
# ---------------------
# Overrides to enable a more debug-friendly dev experience.
# - Backend: enable Gunicorn reload, fewer workers, verbose logging.
# - Frontend: enable Node inspector (9229).

version: "3.9"

services:
  backend:
    environment:
      - APP_ENV=development
      - FLASK_ENV=development
      - FLASK_DEBUG=0
      - FLASK_APP=app:create_app
    working_dir: /app/apps/backend
    command: >
      python -m debugpy --listen 0.0.0.0:5678 --wait-for-client \
        -m flask run --no-debugger --no-reload --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
      - "5678:5678"   # debugpy
    # Mount also the repo root (optional) if you want to tweak shared pkgs live
    volumes:
      - ./:/app:rw

  frontend:
    working_dir: /web/apps/frontend
    command: >
      node --inspect=0.0.0.0:9229 node_modules/vite/bin/vite.js --host 0.0.0.0
    ports:
      - "9229:9229"   # Node inspector