<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" role="img" aria-labelledby="title desc">
  <title id="title">Orbit logo placeholder (light still full)</title>
  <desc id="desc">Placeholder version of the Orbit wordmark for light themes.</desc>
  <defs>
    <style>
      .orbit-ring { stroke: #0071B8; stroke-width: 4; fill: none; }
      .orbit-text { font-family: 'Sansation', 'Inter', sans-serif; font-size: 46px; font-weight: 600; fill: #002A57; }
      .orbit-accent { fill: #3796CD; }
    </style>
  </defs>
  <g transform="translate(20 16)">
    <circle cx="24" cy="24" r="22" class="orbit-ring" />
    <circle cx="24" cy="24" r="6" class="orbit-accent" transform="translate(0,-18)" />
    <text x="54" y="38" class="orbit-text">Orbit</text>
  </g>
</svg>
