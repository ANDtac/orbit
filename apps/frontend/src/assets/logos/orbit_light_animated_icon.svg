<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" role="img" aria-labelledby="title desc">
  <title id="title">Orbit icon placeholder (light animated)</title>
  <desc id="desc">Circular placeholder icon with animated orbital accent.</desc>
  <defs>
    <style>
      .ring { stroke: #0071B8; stroke-width: 4; fill: none; }
      .accent { fill: #3796CD; }
    </style>
  </defs>
  <g transform="translate(40 40)">
    <circle r="28" class="ring" />
    <circle r="6" class="accent" transform="translate(0,-28)">
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="4s" repeatCount="indefinite" />
    </circle>
  </g>
</svg>
